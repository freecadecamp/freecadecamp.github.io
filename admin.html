<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAM Admin · Manage Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-leaf text-green-600 text-2xl"></i>
                <span class="font-bold text-xl">VARAM<span class="text-orange-500">ADMIN</span></span>
            </div>
            <div class="space-x-4">
                <a href="products.html" target="_blank" class="text-green-600 hover:underline">View Store</a>
                <button id="resetDefaultBtn" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm">Reset to Default</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Product Manager</h1>
        <p class="text-gray-500 mb-8">Add, edit or remove products. Changes are saved locally and reflected on the store.</p>

        <!-- Add / Edit Form -->
        <div class="bg-white rounded-2xl shadow-md p-6 mb-10 border border-gray-200">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-green-600"></i> Add / Edit Product</h2>
            <form id="productForm" class="grid md:grid-cols-2 gap-4">
                <input type="hidden" id="productId" value="">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Product Name *</label>
                    <input type="text" id="prodName" required class="w-full border border-gray-300 rounded-lg px-3 py-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Capacity (e.g. "Upto 3kg rice") *</label>
                    <input type="text" id="prodCapacity" required class="w-full border border-gray-300 rounded-lg px-3 py-2 mt-1">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Description *</label>
                    <textarea id="prodDesc" rows="2" required class="w-full border border-gray-300 rounded-lg px-3 py-2 mt-1"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Price (₹) *</label>
                    <input type="number" id="prodPrice" required min="0" step="1000" class="w-full border border-gray-300 rounded-lg px-3 py-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Icon (FontAwesome class, e.g. "fa-utensils") *</label>
                    <input type="text" id="prodIcon" value="fa-industry" required class="w-full border border-gray-300 rounded-lg px-3 py-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Badge Color</label>
                    <select id="prodColor" class="w-full border border-gray-300 rounded-lg px-3 py-2 mt-1">
                        <option value="from-green-500 to-green-600">Green</option>
                        <option value="from-orange-500 to-orange-600">Orange (Premium)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Product Image</label>
                    <input type="text" id="prodImageUrl" placeholder="https://example.com/image.jpg or data:image/..." class="w-full border border-gray-300 rounded-lg px-3 py-2 mt-1">
                    <div class="mt-2">
                        <label class="block text-xs text-gray-500">Or upload an image:</label>
                        <input type="file" id="prodImageUpload" accept="image/*" class="w-full text-sm">
                    </div>
                    <div id="imagePreview" class="mt-2 hidden">
                        <img id="previewImg" class="h-20 w-auto rounded border">
                    </div>
                </div>
                <div class="flex items-end gap-3">
                    <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg shadow">Save Product</button>
                    <button type="button" id="cancelEdit" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded-lg">Cancel</button>
                </div>
            </form>
        </div>

        <!-- Products List -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">
            <div class="px-6 py-4 bg-gradient-to-r from-green-50 to-orange-50 border-b">
                <h2 class="text-xl font-bold">Product Inventory</h2>
            </div>
            <div id="productsList" class="divide-y divide-gray-100">
                <!-- dynamic list -->
            </div>
        </div>
    </div>

    <script>
        // Default products with placeholder images
        const DEFAULT_PRODUCTS = [
            { id: "ge5", name: "GE 5", capacity: "Upto 3kg rice", description: "Perfect for home, travel & picnic. Compact and portable.", price: 12500, icon: "fa-utensils", bgClass: "from-green-500 to-green-600", image: "https://placehold.co/400x300?text=GE5+Gasifier" },
            { id: "ge10", name: "GE 10", capacity: "Upto 7kg rice", description: "Mini Commercial — Tea shops, Food carts, small eateries.", price: 22500, icon: "fa-mug-hot", bgClass: "from-green-500 to-green-600", image: "https://placehold.co/400x300?text=GE10+Gasifier" },
            { id: "ge15", name: "GE 15", capacity: "Upto 15kg rice", description: "Food trucks, Restaurants, Cloud kitchen — high efficiency.", price: 36500, icon: "fa-truck", bgClass: "from-green-500 to-green-600", image: "https://placehold.co/400x300?text=GE15+Gasifier" },
            { id: "ge20", name: "GE 20", capacity: "Upto 30kg rice", description: "Hotels, Mess, College canteens — heavy-duty commercial.", price: 49500, icon: "fa-building", bgClass: "from-green-500 to-green-600", image: "https://placehold.co/400x300?text=GE20+Gasifier" },
            { id: "ge25", name: "GE 25", capacity: "Upto 50kg rice + 30L oil", description: "Industrial — mass cooking, marriage halls, snack makers.", price: 72500, icon: "fa-industry", bgClass: "from-orange-500 to-orange-600", image: "https://placehold.co/400x300?text=GE25+Gasifier" }
        ];

        // Helper functions
        function getProducts() {
            const stored = localStorage.getItem("varam_products");
            if (stored) return JSON.parse(stored);
            localStorage.setItem("varam_products", JSON.stringify(DEFAULT_PRODUCTS));
            return [...DEFAULT_PRODUCTS];
        }

        function saveProducts(products) {
            localStorage.setItem("varam_products", JSON.stringify(products));
            renderProductList();
        }

        function generateId(name) {
            return name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '-' + Date.now().toString().slice(-6);
        }

        // Render products in admin table
        function renderProductList() {
            const products = getProducts();
            const container = document.getElementById("productsList");
            if (!container) return;

            if (products.length === 0) {
                container.innerHTML = '<div class="p-8 text-center text-gray-500">No products. Add one using the form above.</div>';
                return;
            }

            let html = `<div class="overflow-x-auto"><table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Image</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Product</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Capacity</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
            </tr></thead><tbody>`;
            products.forEach(prod => {
                const imgSrc = prod.image || 'https://placehold.co/60x60?text=No+Img';
                html += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <img src="${imgSrc}" class="h-12 w-12 object-cover rounded" onerror="this.src='https://placehold.co/60x60?text=No+Img'">
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-2">
                                <i class="fas ${prod.icon} text-green-600"></i>
                                <span class="font-medium">${prod.name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600">${prod.capacity}</td>
                        <td class="px-6 py-4 text-sm font-semibold text-green-700">₹${prod.price.toLocaleString('en-IN')}</td>
                        <td class="px-6 py-4 text-sm space-x-3">
                            <button class="edit-btn text-blue-600 hover:text-blue-800" data-id="${prod.id}"><i class="fas fa-edit"></i> Edit</button>
                            <button class="delete-btn text-red-600 hover:text-red-800" data-id="${prod.id}"><i class="fas fa-trash-alt"></i> Delete</button>
                        </td>
                    </tr>
                `;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;

            // Attach events
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => editProduct(btn.getAttribute('data-id')));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteProduct(btn.getAttribute('data-id')));
            });
        }

        function editProduct(id) {
            const products = getProducts();
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById("productId").value = product.id;
            document.getElementById("prodName").value = product.name;
            document.getElementById("prodCapacity").value = product.capacity;
            document.getElementById("prodDesc").value = product.description;
            document.getElementById("prodPrice").value = product.price;
            document.getElementById("prodIcon").value = product.icon;
            document.getElementById("prodColor").value = product.bgClass;
            document.getElementById("prodImageUrl").value = product.image || '';
            updatePreview(product.image || '');
        }

        function deleteProduct(id) {
            if (confirm("Delete this product?")) {
                let products = getProducts();
                products = products.filter(p => p.id !== id);
                saveProducts(products);
            }
        }

        // Image preview handling
        const fileInput = document.getElementById("prodImageUpload");
        const urlInput = document.getElementById("prodImageUrl");
        const previewDiv = document.getElementById("imagePreview");
        const previewImg = document.getElementById("previewImg");

        function updatePreview(src) {
            if (src && src.trim() !== "") {
                previewImg.src = src;
                previewDiv.classList.remove("hidden");
            } else {
                previewDiv.classList.add("hidden");
            }
        }

        fileInput.addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const dataUrl = ev.target.result;
                    urlInput.value = dataUrl;
                    updatePreview(dataUrl);
                };
                reader.readAsDataURL(file);
            }
        });

        urlInput.addEventListener("input", function() {
            updatePreview(urlInput.value);
        });

        // Save product (add or update)
        function saveProduct(event) {
            event.preventDefault();

            const idField = document.getElementById("productId").value;
            const name = document.getElementById("prodName").value.trim();
            const capacity = document.getElementById("prodCapacity").value.trim();
            const description = document.getElementById("prodDesc").value.trim();
            const price = parseInt(document.getElementById("prodPrice").value);
            const icon = document.getElementById("prodIcon").value.trim();
            const bgClass = document.getElementById("prodColor").value;
            const image = document.getElementById("prodImageUrl").value.trim();

            if (!name || !capacity || !description || isNaN(price) || !icon) {
                alert("Please fill all required fields.");
                return;
            }

            let products = getProducts();
            if (idField) {
                // Update existing
                const index = products.findIndex(p => p.id === idField);
                if (index !== -1) {
                    products[index] = { ...products[index], name, capacity, description, price, icon, bgClass, image };
                }
            } else {
                // Add new
                const newId = generateId(name);
                const newProduct = { id: newId, name, capacity, description, price, icon, bgClass, image };
                products.push(newProduct);
            }
            saveProducts(products);
            resetForm();
        }

        function resetForm() {
            document.getElementById("productId").value = "";
            document.getElementById("prodName").value = "";
            document.getElementById("prodCapacity").value = "";
            document.getElementById("prodDesc").value = "";
            document.getElementById("prodPrice").value = "";
            document.getElementById("prodIcon").value = "fa-industry";
            document.getElementById("prodColor").value = "from-green-500 to-green-600";
            document.getElementById("prodImageUrl").value = "";
            fileInput.value = "";
            previewDiv.classList.add("hidden");
        }

        function resetToDefault() {
            if (confirm("Reset all products to default set? This will remove any custom products.")) {
                localStorage.setItem("varam_products", JSON.stringify(DEFAULT_PRODUCTS));
                renderProductList();
                resetForm();
            }
        }

        // Initialize everything when DOM is ready
        document.addEventListener("DOMContentLoaded", () => {
            renderProductList();
            document.getElementById("productForm").addEventListener("submit", saveProduct);
            document.getElementById("cancelEdit").addEventListener("click", resetForm);
            document.getElementById("resetDefaultBtn").addEventListener("click", resetToDefault);
        });
    </script>
</body>
</html>
