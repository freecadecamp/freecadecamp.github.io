<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAM SUSTAINABLE SOLUTIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark: #0b5c1f;
            --green-mid: #0f7d2f;
            --green-bright: #16a34a;
            --lime: #84cc16;
            --lime-light: #a3e635;
            --golden: #f0c040;
            --white-soft: #f9fdf9;
            --text-dark: #1a2e1a;
            --text-muted: #556b55;
            --shadow-soft: 0 20px 60px rgba(15, 125, 47, 0.12);
            --shadow-glow: 0 0 80px rgba(22, 163, 74, 0.25);
            --radius-lg: 28px;
            --radius-full: 50%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 30% 20%, #f0faf2 0%, #e8f5e9 30%, #ffffff 70%, #f9fdf9 100%);
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ ANIMATED BACKGROUND ORBS ============ */
        .bg-orb {
            position: absolute;
            border-radius: var(--radius-full);
            pointer-events: none;
            z-index: 0;
            filter: blur(50px);
            opacity: 0.6;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        .bg-orb:nth-child(1) {
            width: 420px;
            height: 420px;
            background: rgba(22, 163, 74, 0.1);
            top: -140px;
            left: -120px;
            animation-name: orbFloat1;
            animation-duration: 12s;
            animation-delay: 0s;
        }

        .bg-orb:nth-child(2) {
            width: 340px;
            height: 340px;
            background: rgba(132, 204, 22, 0.12);
            bottom: -110px;
            right: -100px;
            animation-name: orbFloat2;
            animation-duration: 14s;
            animation-delay: 1.5s;
        }

        .bg-orb:nth-child(3) {
            width: 260px;
            height: 260px;
            background: rgba(163, 230, 53, 0.1);
            top: 55%;
            left: 60%;
            animation-name: orbFloat3;
            animation-duration: 10s;
            animation-delay: 3s;
        }

        .bg-orb:nth-child(4) {
            width: 200px;
            height: 200px;
            background: rgba(22, 163, 74, 0.07);
            top: 10%;
            right: 15%;
            animation-name: orbFloat4;
            animation-duration: 16s;
            animation-delay: 0.8s;
        }

        .bg-orb:nth-child(5) {
            width: 180px;
            height: 180px;
            background: rgba(240, 192, 64, 0.08);
            bottom: 20%;
            left: 8%;
            animation-name: orbFloat1;
            animation-duration: 18s;
            animation-delay: 4s;
        }

        @keyframes orbFloat1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -35px) scale(1.08);
            }
            50% {
                transform: translate(-15px, -20px) scale(0.94);
            }
            75% {
                transform: translate(-25px, 25px) scale(1.05);
            }
        }

        @keyframes orbFloat2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(-35px, -25px) scale(1.1);
            }
            50% {
                transform: translate(20px, 30px) scale(0.92);
            }
            75% {
                transform: translate(30px, -20px) scale(1.06);
            }
        }

        @keyframes orbFloat3 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(25px, 30px) scale(1.07);
            }
            66% {
                transform: translate(-30px, -25px) scale(0.93);
            }
        }

        @keyframes orbFloat4 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-20px, -30px) scale(1.12);
            }
        }

        /* ============ FLOATING PARTICLES ============ */
        .particles-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: var(--radius-full);
            pointer-events: none;
            animation: particleDriftCustom linear infinite;
            opacity: 0;
        }

        @keyframes particleDriftCustom {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0) scale(0.3) rotate(0deg);
            }
            8% {
                opacity: 0.75;
            }
            25% {
                opacity: 0.5;
            }
            50% {
                opacity: 0.25;
            }
            75% {
                opacity: 0.55;
            }
            92% {
                opacity: 0.7;
            }
            100% {
                opacity: 0;
                transform: translateY(-115vh) translateX(var(--drift-x, 40px)) scale(1.5) rotate(200deg);
            }
        }

        /* ============ MAIN CONTAINER ============ */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeInUp 1.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            padding: 20px;
        }

        /* ============ LOGO (NO OVAL CONTAINER) ============ */
        .logo {
            width: 280px;
            max-width: 80%;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.18)) drop-shadow(0 0 25px rgba(22, 163, 74, 0.2));
            animation: logoReveal 1.6s cubic-bezier(0.34, 1.56, 0.64, 1), logoSubtleFloat 5s ease-in-out infinite;
            transition: filter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo:hover {
            filter: drop-shadow(0 16px 35px rgba(0, 0, 0, 0.25)) drop-shadow(0 0 45px rgba(22, 163, 74, 0.4));
            transform: scale(1.04);
        }

        /* EXIT ANIMATION (triggered after 3 seconds) */
        .logo.logo-exit {
            animation: logoExit 0.8s cubic-bezier(0.55, 0, 0.1, 1) forwards !important;
            pointer-events: none;
        }

        @keyframes logoReveal {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(-15deg);
                filter: blur(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
                filter: blur(0);
            }
        }

        @keyframes logoSubtleFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes logoExit {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
                filter: blur(0);
            }
            30% {
                opacity: 1;
                transform: scale(1.2) rotate(2deg);
                filter: blur(2px);
            }
            100% {
                opacity: 0;
                transform: scale(1.6) rotate(5deg);
                filter: blur(20px);
                display: none;
            }
        }

        /* ============ COMPANY NAME ============ */
        .company-name {
            margin-top: 30px;
            font-size: 3.2rem;
            font-weight: 800;
            color: #0b5c1f;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: textReveal 1.8s cubic-bezier(0.22, 0.61, 0.36, 1);
            position: relative;
            display: inline-block;
            text-shadow: 0 2px 8px rgba(11, 92, 31, 0.08);
            background: linear-gradient(180deg, #0b5c1f 0%, #0f7d2f 50%, #0b5c1f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes textReveal {
            from {
                opacity: 0;
                transform: translateY(45px);
                letter-spacing: 18px;
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                letter-spacing: 5px;
                filter: blur(0);
            }
        }

        .company-name::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -10px;
            right: -10px;
            bottom: -4px;
            background: linear-gradient(105deg,
                    transparent 35%,
                    rgba(255, 255, 255, 0.35) 45%,
                    rgba(255, 255, 255, 0.5) 50%,
                    rgba(255, 255, 255, 0.35) 55%,
                    transparent 65%);
            background-size: 200% 100%;
            animation: shimmer 4s ease-in-out infinite;
            pointer-events: none;
            border-radius: 6px;
            z-index: -1;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* ============ ANIMATED LINE ============ */
        .line-wrapper {
            position: relative;
            width: 200px;
            height: 5px;
            margin: 22px auto;
            border-radius: 50px;
            overflow: hidden;
            animation: lineExpand 2s cubic-bezier(0.22, 0.61, 0.36, 1);
            box-shadow: 0 0 20px rgba(22, 163, 74, 0.3);
        }

        .line {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #16a34a, #84cc16, #a3e635, #84cc16, #16a34a);
            background-size: 300% 100%;
            border-radius: 50px;
            animation: gradientFlow 3s linear infinite;
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 300% 50%;
            }
        }

        @keyframes lineExpand {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 200px;
                opacity: 1;
            }
        }

        .line-sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: var(--radius-full);
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 10px #fff, 0 0 20px #a3e635;
            animation: sparkleTravel 2.5s linear infinite;
        }

        .line-sparkle:nth-child(1) {
            animation-delay: 0s;
        }
        .line-sparkle:nth-child(2) {
            animation-delay: 1.25s;
        }

        @keyframes sparkleTravel {
            0% {
                left: -10px;
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            85% {
                opacity: 1;
            }
            100% {
                left: calc(100% + 10px);
                opacity: 0;
            }
        }

        /* ============ TAGLINE ============ */
        .tagline {
            margin-top: 16px;
            font-size: 1.25rem;
            letter-spacing: 6px;
            color: #4a6b4a;
            text-transform: uppercase;
            font-weight: 500;
            animation: taglineReveal 2.2s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        @keyframes taglineReveal {
            from {
                opacity: 0;
                transform: translateY(35px);
                letter-spacing: 16px;
            }
            to {
                opacity: 1;
                transform: translateY(0);
                letter-spacing: 6px;
            }
        }

        .tagline span {
            display: inline-block;
            animation: dotPulse 2s ease-in-out infinite;
        }
        .tagline span:nth-child(1) {
            animation-delay: 0s;
        }
        .tagline span:nth-child(2) {
            animation-delay: 0.6s;
        }

        @keyframes dotPulse {
            0%,
            100% {
                transform: scale(1);
                color: #4a6b4a;
            }
            50% {
                transform: scale(1.5);
                color: #16a34a;
            }
        }

        /* ============ BOTTOM ACCENT DOTS ============ */
        .accent-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 28px;
            animation: fadeInUp 2.6s ease;
        }

        .accent-dot {
            width: 10px;
            height: 10px;
            border-radius: var(--radius-full);
            background: #16a34a;
            animation: dotBounce 2s ease-in-out infinite;
        }
        .accent-dot:nth-child(1) {
            animation-delay: 0s;
            background: #16a34a;
        }
        .accent-dot:nth-child(2) {
            animation-delay: 0.25s;
            background: #84cc16;
        }
        .accent-dot:nth-child(3) {
            animation-delay: 0.5s;
            background: #a3e635;
        }
        .accent-dot:nth-child(4) {
            animation-delay: 0.75s;
            background: #f0c040;
        }
        .accent-dot:nth-child(5) {
            animation-delay: 1s;
            background: #16a34a;
        }

        @keyframes dotBounce {
            0%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-14px);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .company-name {
                font-size: 1.7rem;
                letter-spacing: 3px;
            }
            .tagline {
                font-size: 0.85rem;
                letter-spacing: 3px;
            }
            .logo {
                width: 200px;
            }
            .line-wrapper {
                width: 140px;
                height: 4px;
            }
            @keyframes lineExpand {
                from {
                    width: 0;
                    opacity: 0;
                }
                to {
                    width: 140px;
                    opacity: 1;
                }
            }
            .bg-orb:nth-child(1) {
                width: 250px;
                height: 250px;
                top: -80px;
                left: -70px;
            }
            .bg-orb:nth-child(2) {
                width: 200px;
                height: 200px;
                bottom: -60px;
                right: -60px;
            }
            .accent-dot {
                width: 7px;
                height: 7px;
            }
            .accent-dots {
                gap: 7px;
                margin-top: 20px;
            }
        }

        @media (max-width: 400px) {
            .company-name {
                font-size: 1.35rem;
                letter-spacing: 2px;
            }
            .tagline {
                font-size: 0.7rem;
                letter-spacing: 2px;
            }
            .logo {
                width: 160px;
            }
            .line-wrapper {
                width: 110px;
                height: 3px;
            }
            @keyframes lineExpand {
                from {
                    width: 0;
                    opacity: 0;
                }
                to {
                    width: 110px;
                    opacity: 1;
                }
            }
        }
    </style>
</head>
<body>

    <!-- ============ ANIMATED BACKGROUND ORBS ============ -->
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <!-- ============ FLOATING PARTICLES ============ -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="container">
        <!-- Logo (no oval container) -->
        <img src="logo.png" alt="VARAM Logo" class="logo" id="mainLogo">

        <!-- Company Name -->
        <h1 class="company-name">
            VARAM SUSTAINABLE SOLUTIONS
        </h1>

        <!-- Animated Gradient Line with Sparkles -->
        <div class="line-wrapper">
            <div class="line"></div>
            <div class="line-sparkle"></div>
            <div class="line-sparkle"></div>
        </div>

        <!-- Tagline -->
        <p class="tagline">
            GREEN ENERGY <span>•</span> CLEAN ENERGY
        </p>

        <!-- Accent bouncing dots -->
        <div class="accent-dots">
            <div class="accent-dot"></div>
            <div class="accent-dot"></div>
            <div class="accent-dot"></div>
            <div class="accent-dot"></div>
            <div class="accent-dot"></div>
        </div>
    </div>

    <!-- ============ JAVASCRIPT FOR PARTICLES & REDIRECT ============ -->
    <script>
        (function() {
            // --- Generate floating particles ---
            const container = document.getElementById('particlesContainer');
            const particleCount = 35;
            const colors = [
                'rgba(22,163,74,0.7)',
                'rgba(132,204,22,0.65)',
                'rgba(163,230,53,0.6)',
                'rgba(240,192,64,0.55)',
                'rgba(15,125,47,0.7)',
                'rgba(34,197,94,0.6)',
            ];

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                const size = Math.random() * 8 + 3;
                const startX = Math.random() * 100;
                const startY = Math.random() * 100 + 100;
                const duration = Math.random() * 14 + 10;
                const delay = Math.random() * 16;
                const driftX = (Math.random() - 0.5) * 140;
                const color = colors[Math.floor(Math.random() * colors.length)];

                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${startX}%;
                    top: ${startY}%;
                    background: ${color};
                    box-shadow: 0 0 ${size * 3}px ${color}, 0 0 ${size * 6}px ${color};
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    --drift-x: ${driftX}px;
                `;

                container.appendChild(particle);
            }

            // --- Redirect after 3 seconds with exit animation ---
            const logo = document.getElementById('mainLogo');

            setTimeout(() => {
                // Add the exit class to trigger the animation
                logo.classList.add('logo-exit');

                // After the animation ends (0.8s), redirect to home.html
                logo.addEventListener('animationend', function handler(e) {
                    if (e.animationName === 'logoExit') {
                        logo.removeEventListener('animationend', handler);
                        window.location.href = 'home.html';
                    }
                });

                // Fallback: redirect after 1 second in case animationend doesn't fire
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            }, 3000);
        })();
    </script>
</body>
</html>
